name: Scrape Gatik fleet data

on:
  schedule:
    # Every 3 hours, on the hour (00:00, 03:00, 06:00 ... UTC).
    - cron: "0 */3 * * *"
  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write           # lets the job commit the updated data back to the repo

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          DEBUG: "1"
        run: python scraper.py

      - name: Upload debug page (only if a run found no rows)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: debug-page
          path: |
            data/_debug_last_page.html
            data/_debug_last_text.txt
          if-no-files-found: ignore

      - name: Commit updated data
        run: |
          git config user.name  "fleet-watch-bot"
          git config user.email "actions@github.com"
          rm -f data/_debug_last_page.html data/_debug_last_text.txt
          git add data/history.json data/latest.json
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: capture $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
